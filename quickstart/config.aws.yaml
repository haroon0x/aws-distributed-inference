# iii engine configuration for AWS.
# Run this only on the private engine VM. App workers run on separate VMs
# and connect to this engine with III_URL=ws://ENGINE_PRIVATE_IP:49134.
workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/state_store.db

  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0
      default_timeout: 300000
      concurrency_request_limit: 128
      cors:
        allowed_origins:
          - '*'
        allowed_methods:
          - GET
          - POST
          - OPTIONS
